<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock & Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .clock-display {
            text-align: center;
            margin-bottom: 30px;
        }

        .clock-time {
            font-size: 72px;
            font-weight: 300;
            color: #fff;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
        }

        .clock-date {
            font-size: 16px;
            color: #8892b0;
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: #0d1117;
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #8892b0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .tab.active {
            background: #238636;
            color: #fff;
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: #c9d1d9;
        }

        .panel {
            background: #0d1117;
            border-radius: 16px;
            padding: 32px;
            display: none;
        }

        .panel.active {
            display: block;
        }

        .timer-display {
            font-size: 56px;
            font-weight: 300;
            color: #fff;
            text-align: center;
            font-variant-numeric: tabular-nums;
            margin-bottom: 24px;
        }

        .timer-input-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .timer-input-group input {
            width: 70px;
            padding: 12px;
            border: 1px solid #30363d;
            background: #161b22;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            text-align: center;
        }

        .timer-input-group input:focus {
            outline: none;
            border-color: #238636;
        }

        .timer-input-group span {
            color: #8892b0;
            font-size: 14px;
            align-self: center;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #238636;
            color: #fff;
        }

        .btn-primary:hover {
            background: #2ea043;
        }

        .btn-secondary {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }

        .btn-secondary:hover {
            background: #30363d;
        }

        .lap-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 16px;
            background: #161b22;
            border-radius: 8px;
            margin-bottom: 8px;
            color: #c9d1d9;
            font-size: 14px;
        }

        .lap-number {
            color: #8b949e;
        }

        .lap-time {
            font-variant-numeric: tabular-nums;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #161b22;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock-display">
            <div class="clock-time" id="clockTime">00:00:00</div>
            <div class="clock-date" id="clockDate"></div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="timer">Timer</button>
            <button class="tab" data-tab="stopwatch">Stopwatch</button>
        </div>

        <div class="panel active" id="timerPanel">
            <div class="timer-input-group" id="timerInputGroup">
                <input type="number" id="hours" placeholder="00" min="0" max="99" value="0">
                <span>hrs</span>
                <input type="number" id="minutes" placeholder="00" min="0" max="59" value="5">
                <span>min</span>
                <input type="number" id="seconds" placeholder="00" min="0" max="59" value="0">
                <span>sec</span>
            </div>
            <div class="timer-display" id="timerDisplay">05:00:00</div>
            <div class="controls">
                <button class="btn btn-primary" id="timerStartBtn">Start</button>
                <button class="btn btn-secondary" id="timerResetBtn">Reset</button>
            </div>
        </div>

        <div class="panel" id="stopwatchPanel">
            <div class="timer-display" id="stopwatchDisplay">00:00:00</div>
            <div class="controls">
                <button class="btn btn-primary" id="stopwatchStartBtn">Start</button>
                <button class="btn btn-secondary" id="lapBtn">Lap</button>
                <button class="btn btn-secondary" id="stopwatchResetBtn">Reset</button>
            </div>
            <div class="lap-list" id="lapList"></div>
        </div>
    </div>

    <script>
        const clockTime = document.getElementById('clockTime');
        const clockDate = document.getElementById('clockDate');
        const tabs = document.querySelectorAll('.tab');
        const panels = document.querySelectorAll('.panel');

        const timerDisplay = document.getElementById('timerDisplay');
        const timerInputGroup = document.getElementById('timerInputGroup');
        const hoursInput = document.getElementById('hours');
        const minutesInput = document.getElementById('minutes');
        const secondsInput = document.getElementById('seconds');
        const timerStartBtn = document.getElementById('timerStartBtn');
        const timerResetBtn = document.getElementById('timerResetBtn');

        const stopwatchDisplay = document.getElementById('stopwatchDisplay');
        const stopwatchStartBtn = document.getElementById('stopwatchStartBtn');
        const lapBtn = document.getElementById('lapBtn');
        const stopwatchResetBtn = document.getElementById('stopwatchResetBtn');
        const lapList = document.getElementById('lapList');

        let timerInterval = null;
        let timerRunning = false;
        let timerSeconds = 300;

        let stopwatchInterval = null;
        let stopwatchRunning = false;
        let stopwatchMs = 0;
        let lapCount = 0;

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockTime.textContent = `${hours}:${minutes}:${seconds}`;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            clockDate.textContent = now.toLocaleDateString('en-US', options);
        }

        function formatTime(totalSeconds) {
            const hrs = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;
            return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function formatStopwatch(ms) {
            const totalSecs = Math.floor(ms / 1000);
            const mins = Math.floor(totalSecs / 60);
            const secs = totalSecs % 60;
            const centis = Math.floor((ms % 1000) / 10);
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(centis).padStart(2, '0')}`;
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                panels.forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}Panel`).classList.add('active');
            });
        });

        timerStartBtn.addEventListener('click', () => {
            if (!timerRunning) {
                const h = parseInt(hoursInput.value) || 0;
                const m = parseInt(minutesInput.value) || 0;
                const s = parseInt(secondsInput.value) || 0;
                timerSeconds = h * 3600 + m * 60 + s;
                if (timerSeconds <= 0) return;
                timerDisplay.textContent = formatTime(timerSeconds);
                timerInputGroup.style.display = 'none';
                timerRunning = true;
                timerStartBtn.textContent = 'Pause';
                timerInterval = setInterval(() => {
                    timerSeconds--;
                    timerDisplay.textContent = formatTime(timerSeconds);
                    if (timerSeconds <= 0) {
                        clearInterval(timerInterval);
                        timerRunning = false;
                        timerStartBtn.textContent = 'Start';
                        timerDisplay.textContent = '00:00:00';
                        timerInputGroup.style.display = 'flex';
                    }
                }, 1000);
            } else {
                clearInterval(timerInterval);
                timerRunning = false;
                timerStartBtn.textContent = 'Resume';
            }
        });

        timerResetBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            timerRunning = false;
            timerSeconds = parseInt(hoursInput.value) * 3600 + parseInt(minutesInput.value) * 60 + parseInt(secondsInput.value);
            if (timerSeconds <= 0) timerSeconds = 300;
            timerDisplay.textContent = formatTime(timerSeconds);
            timerStartBtn.textContent = 'Start';
            timerInputGroup.style.display = 'flex';
        });

        stopwatchStartBtn.addEventListener('click', () => {
            if (!stopwatchRunning) {
                stopwatchRunning = true;
                stopwatchStartBtn.textContent = 'Pause';
                lapBtn.disabled = false;
                stopwatchInterval = setInterval(() => {
                    stopwatchMs += 10;
                    stopwatchDisplay.textContent = formatStopwatch(stopwatchMs);
                }, 10);
            } else {
                clearInterval(stopwatchInterval);
                stopwatchRunning = false;
                stopwatchStartBtn.textContent = 'Resume';
            }
        });

        lapBtn.addEventListener('click', () => {
            if (stopwatchRunning || stopwatchMs > 0) {
                lapCount++;
                const lapItem = document.createElement('div');
                lapItem.className = 'lap-item';
                lapItem.innerHTML = `
                    <span class="lap-number">Lap ${lapCount}</span>
                    <span class="lap-time">${formatStopwatch(stopwatchMs)}</span>
                `;
                lapList.insertBefore(lapItem, lapList.firstChild);
            }
        });

        stopwatchResetBtn.addEventListener('click', () => {
            clearInterval(stopwatchInterval);
            stopwatchRunning = false;
            stopwatchMs = 0;
            lapCount = 0;
            stopwatchDisplay.textContent = '00:00:00';
            stopwatchStartBtn.textContent = 'Start';
            lapList.innerHTML = '';
        });

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
